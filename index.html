<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>安心施錠カウンター</title>

  <!-- iPhoneホーム画面追加向け -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="安心施錠" />
  <meta name="theme-color" content="#173058" />

  <style>
    :root {
      --bg1: #152340;
      --bg2: #214c7a;
      --bg3: #3d82b5;
      --card: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --subtext: rgba(255, 255, 255, 0.84);
      --accent1: #ff9a3c;
      --accent2: #ff4f8b;
      --success1: #1fb96c;
      --success2: #60ddb6;
      --progress: #ffe082;
      --overlay: rgba(7, 12, 20, 0.56);
      --rewardText: #1e2230;
      --panel: #ffffff;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Noto Sans JP",
        sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 46%, var(--bg3) 100%);
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(16px, env(safe-area-inset-top))
        20px
        max(20px, env(safe-area-inset-bottom))
        20px;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
      text-align: center;
    }

    .titleBlock {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .title {
      margin: 0;
      font-size: 1.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .dateLabel {
      font-size: 0.95rem;
      color: var(--subtext);
      font-weight: 600;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--subtext);
      font-weight: 600;
      margin-top: 2px;
    }

    .counterBlock {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .countValue {
      font-size: clamp(4.8rem, 18vw, 6.2rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .countTarget {
      font-size: 1.4rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.78);
      margin: 0;
    }

    .progressOuter {
      width: min(100%, 290px);
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.08);
      margin: 2px auto 0;
    }

    .progressInner {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffe082 0%, #ffd54f 100%);
      transition: width 220ms ease;
    }

    .statusText {
      margin: 2px 0 0;
      font-size: 1.2rem;
      font-weight: 800;
      min-height: 1.6em;
    }

    .mainButtonWrap {
      display: flex;
      justify-content: center;
      margin-top: 2px;
    }

    .mainButton {
      appearance: none;
      border: none;
      cursor: pointer;
      width: min(72vw, 280px);
      height: min(72vw, 280px);
      border-radius: 999px;
      color: #fff;
      background:
        linear-gradient(145deg, var(--accent1) 0%, var(--accent2) 100%);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transform: scale(1);
      transition:
        transform 120ms ease,
        filter 160ms ease,
        opacity 160ms ease,
        background 200ms ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .mainButton:active {
      transform: scale(0.97);
    }

    .mainButton.done {
      background:
        linear-gradient(145deg, var(--success1) 0%, var(--success2) 100%);
      cursor: default;
    }

    .mainButton:disabled {
      opacity: 0.96;
    }

    .mainButtonIcon {
      font-size: 3.5rem;
      line-height: 1;
    }

    .mainButtonLabel {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .footerRow {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 2px;
    }

    .resetButton {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .footNote {
      font-size: 0.85rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.82);
      max-width: 300px;
    }

    .rewardOverlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        max(18px, env(safe-area-inset-top))
        20px
        max(18px, env(safe-area-inset-bottom))
        20px;
      z-index: 999;
    }

    .rewardOverlay.show {
      display: flex;
      animation: fadeIn 220ms ease;
    }

    .rewardCard {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      color: var(--rewardText);
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.24);
      padding: 28px 22px 24px;
      text-align: center;
      transform: scale(0.96);
      animation: popIn 220ms ease forwards;
    }

    .rewardEmojiTop {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 10px;
    }

    .rewardTitle {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 900;
    }

    .rewardIce {
      font-size: 5.4rem;
      line-height: 1;
      margin: 14px 0 10px;
    }

    .rewardMessage {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #5e6474;
      font-weight: 700;
    }

    .rewardButton {
      appearance: none;
      border: none;
      cursor: pointer;
      width: 100%;
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px;
      background: #2c73ff;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .hintBox {
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 14px 14px;
      font-size: 0.88rem;
      line-height: 1.6;
      text-align: left;
      color: rgba(255, 255, 255, 0.88);
    }

    .hintBox strong {
      color: #fff;
    }

    .smallMuted {
      opacity: 0.82;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 380px) {
      .title {
        font-size: 1.7rem;
      }

      .statusText {
        font-size: 1.08rem;
      }

      .mainButtonLabel {
        font-size: 1.55rem;
      }

      .rewardTitle {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="container">
      <section class="titleBlock">
        <h1 class="title">安心施錠カウンター</h1>
        <div class="dateLabel" id="dateLabel">----/--/--</div>
        <div class="subtitle">確認のたびに押してください</div>
      </section>

      <section class="counterBlock">
        <p class="countValue" id="countValue">0</p>
        <p class="countTarget" id="countTarget">/ 10</p>

        <div class="progressOuter" aria-hidden="true">
          <div class="progressInner" id="progressInner"></div>
        </div>

        <p class="statusText" id="statusText">あと 10 回でご褒美</p>
      </section>

      <section class="mainButtonWrap">
        <button class="mainButton" id="countButton" type="button" aria-label="確認した">
          <div class="mainButtonIcon" id="mainButtonIcon">🔒</div>
          <div class="mainButtonLabel" id="mainButtonLabel">確認した</div>
        </button>
      </section>

      <section class="footerRow">
        <button class="resetButton" id="resetButton" type="button">手動リセット</button>

        <div class="footNote">
          日付が変わると自動で 0 に戻ります
        </div>
      </section>

      <section class="hintBox">
        <strong>使い方</strong><br />
        1回確認したら、中央の大きなボタンを押します。<br />
        10回でご褒美表示になり、<span class="smallMuted">reward.mp3</span> を再生します。
      </section>
    </main>
  </div>

  <div class="rewardOverlay" id="rewardOverlay" aria-hidden="true">
    <div class="rewardCard" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
      <div class="rewardEmojiTop">🎉</div>
      <h2 class="rewardTitle" id="rewardTitle">アイスを食べて良い！</h2>
      <div class="rewardIce">🍨</div>
      <p class="rewardMessage">10回の確認、おつかれさまでした。</p>
      <button class="rewardButton" id="restartButton" type="button">もう一度はじめる</button>
    </div>
  </div>

  <script>
    (() => {
      const TARGET_COUNT = 10;
      const STORAGE_KEY = "anshin-sejo-counter-state-v1";

      const countValueEl = document.getElementById("countValue");
      const countTargetEl = document.getElementById("countTarget");
      const statusTextEl = document.getElementById("statusText");
      const progressInnerEl = document.getElementById("progressInner");
      const dateLabelEl = document.getElementById("dateLabel");

      const countButton = document.getElementById("countButton");
      const mainButtonIcon = document.getElementById("mainButtonIcon");
      const mainButtonLabel = document.getElementById("mainButtonLabel");
      const resetButton = document.getElementById("resetButton");

      const rewardOverlay = document.getElementById("rewardOverlay");
      const restartButton = document.getElementById("restartButton");

      let state = {
        dateKey: "",
        count: 0,
        showReward: false
      };

      let audioContext = null;
      let rewardAudio = null;

      countTargetEl.textContent = `/ ${TARGET_COUNT}`;

      function todayKey() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function todayLabel() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}/${m}/${d}`;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function ensureFreshDay() {
        const today = todayKey();
        if (!state.dateKey || state.dateKey !== today) {
          state.dateKey = today;
          state.count = 0;
          state.showReward = false;
          saveState();
        }
      }

      function initState() {
        const saved = loadState();
        if (saved && typeof saved === "object") {
          state = {
            dateKey: saved.dateKey || todayKey(),
            count: Number(saved.count) || 0,
            showReward: Boolean(saved.showReward)
          };
        } else {
          state = {
            dateKey: todayKey(),
            count: 0,
            showReward: false
          };
        }

        ensureFreshDay();
      }

      function updateUI() {
        dateLabelEl.textContent = todayLabel();
        countValueEl.textContent = String(state.count);

        const progress = Math.max(0, Math.min(state.count, TARGET_COUNT)) / TARGET_COUNT;
        progressInnerEl.style.width = `${progress * 100}%`;

        if (state.showReward) {
          statusTextEl.textContent = "達成しました！";
          countButton.disabled = true;
          countButton.classList.add("done");
          mainButtonIcon.textContent = "✅";
          mainButtonLabel.textContent = "達成済み";
          rewardOverlay.classList.add("show");
          rewardOverlay.setAttribute("aria-hidden", "false");
        } else {
          const remaining = Math.max(TARGET_COUNT - state.count, 0);
          statusTextEl.textContent = `あと ${remaining} 回でご褒美`;
          countButton.disabled = false;
          countButton.classList.remove("done");
          mainButtonIcon.textContent = "🔒";
          mainButtonLabel.textContent = "確認した";
          rewardOverlay.classList.remove("show");
          rewardOverlay.setAttribute("aria-hidden", "true");
        }
      }

      function ensureAudioContext() {
        if (!audioContext) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) {
            audioContext = new Ctx();
          }
        }

        if (audioContext && audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
      }

      function playBeep(step) {
        ensureAudioContext();
        if (!audioContext) return;

        const progress = Math.max(0, Math.min(step, TARGET_COUNT)) / TARGET_COUNT;
        const frequency = 440 + progress * 420; // 440Hz → 860Hz
        const duration = 0.10;

        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = frequency;

        const now = audioContext.currentTime;
        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.linearRampToValueAtTime(0.22, now + 0.01);
        gainNode.gain.linearRampToValueAtTime(0.0001, now + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(now);
        oscillator.stop(now + duration + 0.01);
      }

      async function playReward() {
        try {
          if (!rewardAudio) {
            rewardAudio = new Audio("reward.mp3");
            rewardAudio.preload = "auto";
          }

          rewardAudio.currentTime = 0;
          await rewardAudio.play();
        } catch (error) {
          playFallbackFanfare();
        }
      }

      function playFallbackFanfare() {
        ensureAudioContext();
        if (!audioContext) return;

        const notes = [523.25, 659.25, 783.99, 1046.5];
        const start = audioContext.currentTime;

        notes.forEach((freq, index) => {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const noteStart = start + index * 0.12;
          const noteDuration = index === notes.length - 1 ? 0.34 : 0.10;

          osc.type = "sine";
          osc.frequency.value = freq;

          gain.gain.setValueAtTime(0.0001, noteStart);
          gain.gain.linearRampToValueAtTime(index === notes.length - 1 ? 0.26 : 0.22, noteStart + 0.01);
          gain.gain.linearRampToValueAtTime(0.0001, noteStart + noteDuration);

          osc.connect(gain);
          gain.connect(audioContext.destination);

          osc.start(noteStart);
          osc.stop(noteStart + noteDuration + 0.02);
        });
      }

      function vibrateLight() {
        if (navigator.vibrate) {
          navigator.vibrate(20);
        }
      }

      function incrementCount() {
        ensureFreshDay();

        if (state.showReward) return;

        state.count += 1;
        state.dateKey = todayKey();

        saveState();
        updateUI();
        playBeep(state.count);
        vibrateLight();

        if (state.count >= TARGET_COUNT) {
          setTimeout(() => {
            state.showReward = true;
            saveState();
            updateUI();
            playReward();
            if (navigator.vibrate) {
              navigator.vibrate([40, 40, 80]);
            }
          }, 140);
        }
      }

      function resetCounter() {
        state.count = 0;
        state.showReward = false;
        state.dateKey = todayKey();
        saveState();
        updateUI();

        if (rewardAudio) {
          rewardAudio.pause();
          rewardAudio.currentTime = 0;
        }
      }

      function onVisibilityOrFocus() {
        const before = state.dateKey;
        ensureFreshDay();
        if (before !== state.dateKey) {
          updateUI();
        } else {
          dateLabelEl.textContent = todayLabel();
        }
      }

      countButton.addEventListener("click", incrementCount);
      resetButton.addEventListener("click", resetCounter);
      restartButton.addEventListener("click", resetCounter);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          onVisibilityOrFocus();
        }
      });

      window.addEventListener("focus", onVisibilityOrFocus);

      setInterval(() => {
        const before = state.dateKey;
        ensureFreshDay();
        if (before !== state.dateKey) {
          updateUI();
        } else {
          dateLabelEl.textContent = todayLabel();
        }
      }, 30000);

      initState();
      updateUI();

      // 初回タップ前の事前読み込み
      rewardAudio = new Audio("reward.mp3");
      rewardAudio.preload = "auto";
    })();
  </script>
</body>
</html>
